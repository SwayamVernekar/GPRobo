databases:
  - name: job-app-db
    plan: free

services:
  - type: web
    name: job-application-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        fromService:
          type: database
          name: job-app-db
          property: connectionString